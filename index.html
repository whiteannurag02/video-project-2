<!DOCTYPE html>
<html>
<head>
<title>Annurag Vartak Downloader</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

h1{
color:#ff0055;
font-size:40px;
}

input{
width:60%;
padding:15px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
padding:15px 30px;
background:#ff0055;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ff3366;
}

.footer{
margin-top:80px;
opacity:0.6;
}

</style>

</head>

<body>

<h1>Annurag Vartak Downloader</h1>

<p>Download Instagram Reel • Photo • Audio • YouTube Video</p>

<input id="url" placeholder="Paste link here">

<br>

<button onclick="download()">Download</button>

<div id="status"></div>

<div class="footer">
Created by Annurag Vartak
</div>

<script>

function download(){

const url = document.getElementById("url").value;

if(!url){
alert("Paste URL first");
return;
}

document.getElementById("status").innerHTML="Downloading please wait...";

window.location="/download?url="+encodeURIComponent(url);

setTimeout(()=>{
document.getElementById("status").innerHTML="";
},5000)

}

</script>

</body>
</html>
